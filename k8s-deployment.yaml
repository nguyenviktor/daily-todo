apiVersion: apps/v1
kind: Deployment
metadata:
  name: daily-todo-deployment
  labels:
    app: daily-todo
spec:
  replicas: 2 # Chạy 2 bản sao cho tính sẵn sàng cao (High Availability)
  selector:
    matchLabels:
      app: daily-todo
  template:
    metadata:
      labels:
        app: daily-todo
    spec:
      containers:
      - name: daily-todo-app
        # CHÚ Ý: Thay username-cua-ban thành Dockerhub username của bạn
        image: username-cua-ban/daily-todo:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: daily-todo-service
spec:
  # LoadBalancer sẽ tự thiết lập IP ngoài (phụ thuộc vào Cloud Provider)
  # Với môi trường local (Minikube/Docker Desktop), có thể dùng NodePort
  type: LoadBalancer 
  selector:
    app: daily-todo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
